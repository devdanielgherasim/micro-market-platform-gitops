# CI-only overlay for the `aws`/`azure`/`gcp` secretStores block ArgoCD
# injects only for the external-secrets-config addon (see
# bootstrap/root/templates/applications.yaml lines 40-55, and
# bootstrap/root/values.yaml `secretStores`). Applied in addition to
# ci/global-values.yaml, and only when linting/templating
# platform/external-secrets-config -- other charts don't consume these keys
# and several (e.g. cert-manager) reject unrecognized top-level keys via a
# strict values.schema.json, so this stays out of the shared overlay.
aws:
  region: us-east-1
  secretPrefix: danielgherasim-microservices/dev
azure:
  vaultUrl: ""
  tenantId: ""
  externalSecretsClientId: ""
gcp:
  projectId: ""
  clusterLocation: europe-west3-a
  clusterName: ""
  secretPrefix: danielgherasim-microservices-dev
  serviceAccount:
    gcpServiceAccount: ""
