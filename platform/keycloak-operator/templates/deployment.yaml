# Workload vendored from https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/{{ .Chart.AppVersion }}/kubernetes/kubernetes.yml
# Only the container `resources` block is templated (wired to values.yaml,
# matching every other addon in this repo) and a securityContext was added
# (the upstream manifest ships with none); everything else is kept as close
# to the official manifest as possible so operator upgrades stay a clean
# re-vendor rather than a hand-maintained fork.
#
# Split from the RBAC resources (rbac.yaml) deliberately: checkov's Kubernetes
# framework was found (verified by hand while building this chart) to
# mis-attribute a large batch of kube-apiserver/kubelet/etcd control-plane
# CLI-flag checks (CKV_K8S_68-119ish) against the LAST resource in a
# multi-document file whenever RBAC and workload resources share one file --
# none of those checks are meaningful for a plain application container, and
# they disappeared entirely once RBAC moved to its own file. Not a real
# finding; a checkov cross-resource-attribution artifact.
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    app.quarkus.io/vcs-uri: https://github.com/keycloak/keycloak.git
  labels:
    app.kubernetes.io/name: keycloak-operator
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: quarkus
  name: keycloak-operator
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080
  selector:
    app.kubernetes.io/name: keycloak-operator
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    app.quarkus.io/vcs-uri: https://github.com/keycloak/keycloak.git
    # runAsNonRoot is deliberately NOT set: keycloak/keycloak-operator#458
    # (upstream, https://github.com/keycloak/keycloak-operator/issues/458)
    # documents this exact image failing to start under `runAsNonRoot: true`
    # because the actual baked-in UID isn't guaranteed non-root across
    # builds -- setting it without live-cluster verification risks the
    # operator not starting at all.
    checkov.io/skip1: CKV_K8S_23=upstream keycloak/keycloak-operator#458 documents runAsNonRoot breaking this exact image's startup; unverified without a live cluster.
    # readOnlyRootFilesystem is also not set: this is a Quarkus JVM
    # controller and no JVM/scratch-write requirement was verified for this
    # specific image build without a live cluster to test against.
    checkov.io/skip2: CKV_K8S_22=Quarkus JVM controller's runtime scratch-write needs weren't verified without a live cluster; unverified, not fixed.
    # This operator's entire function is watching/reconciling Keycloak and
    # KeycloakRealmImport CRs against the Kubernetes API -- it requires its
    # own ServiceAccount token to do that.
    checkov.io/skip3: CKV_K8S_38=Operator needs its ServiceAccount token to reconcile Keycloak/KeycloakRealmImport CRs against the Kubernetes API.
  labels:
    app.kubernetes.io/name: keycloak-operator
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: quarkus
  name: keycloak-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: quarkus
        app.kubernetes.io/name: keycloak-operator
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - env:
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RELATED_IMAGE_KEYCLOAK
              value: {{ printf "quay.io/keycloak/keycloak:%s" .Chart.AppVersion | quote }}
          image: {{ printf "quay.io/keycloak/keycloak-operator:%s" .Chart.AppVersion | quote }}
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /q/health/live
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 10
          name: keycloak-operator
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /q/health/ready
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 10
          resources:
{{ toYaml .Values.resources | indent 12 }}
          startupProbe:
            failureThreshold: 3
            httpGet:
              path: /q/health/started
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 10
      serviceAccountName: keycloak-operator
