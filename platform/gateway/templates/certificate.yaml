apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-gateway-tls
  namespace: istio-ingress
spec:
  secretName: platform-gateway-tls
  issuerRef:
    kind: ClusterIssuer
    name: {{ .Values.global.clusterIssuer | quote }}
  dnsNames:
    - {{ .Values.global.domain | quote }}
    - {{ printf "*.%s" .Values.global.domain | quote }}
