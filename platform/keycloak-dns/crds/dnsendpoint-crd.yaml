# Vendored from kubernetes-sigs/external-dns (config/crd/standard/dnsendpoint.yaml),
# same "no upstream Helm chart ships this" situation as ADR-13's
# keycloak-operator CRDs: the external-dns Helm chart (targetRevision
# 1.21.1, see bootstrap/root/values.yaml) installs the controller and RBAC
# for the `crd` source, but does not itself ship the DNSEndpoint CRD -
# it must be installed separately. VERIFY DURING IMPLEMENTATION against the
# pinned chart version's actual CRD manifest before relying on this in a
# live sync; re-sync this file if external-dns's targetRevision changes.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dnsendpoints.externaldns.k8s.io
spec:
  group: externaldns.k8s.io
  scope: Namespaced
  names:
    kind: DNSEndpoint
    listKind: DNSEndpointList
    plural: dnsendpoints
    singular: dnsendpoint
    shortNames:
      - de
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                endpoints:
                  type: array
                  items:
                    type: object
                    properties:
                      dnsName:
                        type: string
                      recordType:
                        type: string
                      recordTTL:
                        type: integer
                        format: int64
                      targets:
                        type: array
                        items:
                          type: string
                      labels:
                        type: object
                        additionalProperties:
                          type: string
                      providerSpecific:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            value:
                              type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
