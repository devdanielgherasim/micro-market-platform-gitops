provider:
  name: cloudflare

sources:
  - gateway-httproute
  - service
  # DNSEndpoint CRD source (ADR-19): publishes auth.danielgherasim.com for
  # Keycloak's off-cluster PaaS endpoint, which has no in-cluster
  # HTTPRoute/Service to derive a record from. See platform/keycloak-dns.
  - crd

domainFilters:
  - danielgherasim.com
policy: sync
txtOwnerId: micro-market

env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: api-token

serviceAccount:
  create: true
  name: external-dns
  annotations: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
