apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: {{ .Values.keycloak.name | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: platform
    environment: {{ .Values.global.environment | quote }}
spec:
  instances: {{ ternary 1 .Values.keycloak.instances (eq .Values.global.environment "dev") }}
  image: {{ .Values.keycloak.image | quote }}
  bootstrapAdmin:
    user:
      secret: keycloak-admin
  db:
    vendor: {{ .Values.keycloak.db.vendor | quote }}
    {{- with .Values.keycloak.db.host }}
    host: {{ .Values.keycloak.db.host | quote }}
    {{- end }}
    {{- with .Values.keycloak.db.port }}
    port: {{ .Values.keycloak.db.port }}
    {{- end }}
    {{- with .Values.keycloak.db.database }}
    database: {{ .Values.keycloak.db.database | quote }}
    {{- end }}
    usernameSecret:
      name: {{ .Values.keycloak.db.usernameSecret.name | quote }}
      key: {{ .Values.keycloak.db.usernameSecret.key | quote }}
    passwordSecret:
      name: {{ .Values.keycloak.db.passwordSecret.name | quote }}
      key: {{ .Values.keycloak.db.passwordSecret.key | quote }}
  hostname:
    hostname: {{ default .Values.global.authDomain .Values.keycloak.hostname | quote }}
    strict: true
    backchannelDynamic: true
  http:
    httpEnabled: true
  ingress:
    enabled: false
  transaction:
    xaEnabled: true
  features:
    enabled:
      - token-exchange
      - admin-fine-grained-authz
  additionalOptions:
    - name: http-relative-path
      value: {{ .Values.keycloak.httpRelativePath | quote }}
    - name: proxy-headers
      value: xforwarded
    - name: health-enabled
      value: "true"
    - name: metrics-enabled
      value: "true"
    - name: log-level
      value: info
    {{- range .Values.keycloak.additionalOptions }}
    - name: {{ .name | quote }}
      {{- if .value }}
      value: {{ .value | quote }}
      {{- else if .secret }}
      secret:
        name: {{ .secret.name | quote }}
        key: {{ .secret.key | quote }}
      {{- end }}
    {{- end }}
  resources:
{{- if eq .Values.global.environment "dev" }}
{{ toYaml .Values.keycloak.devResources | indent 4 }}
{{- else }}
{{ toYaml .Values.keycloak.resources | indent 4 }}
{{- end }}
