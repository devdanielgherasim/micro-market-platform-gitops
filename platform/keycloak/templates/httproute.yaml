apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: platform
spec:
  parentRefs:
    - name: public-gateway
      namespace: istio-ingress
  hostnames:
    - {{ default .Values.global.authDomain .Values.keycloak.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.keycloak.httpRelativePath | quote }}
      backendRefs:
        - name: {{ printf "%s-service" .Values.keycloak.name | quote }}
          port: 8080
