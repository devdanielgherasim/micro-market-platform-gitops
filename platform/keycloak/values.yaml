global:
  domain: danielgherasim.com
  authDomain: auth.danielgherasim.com
  environment: dev

keycloak:
  name: keycloak
  instances: 2
  image: quay.io/keycloak/keycloak:26.3.1
  hostname: ""
  httpRelativePath: /auth
  db:
    vendor: postgres
    host: ""
    port: null
    database: ""
    usernameSecret:
      name: keycloak-postgresql
      key: POSTGRES_USER
    passwordSecret:
      name: keycloak-postgresql
      key: POSTGRES_PASSWORD
  additionalOptions:
    - name: db-url-host
      secret:
        name: keycloak-postgresql
        key: POSTGRES_HOST
    - name: db-url-port
      secret:
        name: keycloak-postgresql
        key: POSTGRES_PORT
    - name: db-url-database
      secret:
        name: keycloak-postgresql
        key: POSTGRES_DB
  # Applied when global.environment == "dev" (single instance, right-sized
  # for a dissertation-scale cluster). See templates/keycloak.yaml.
  devResources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 750m
      memory: 768Mi
  # Applied for every other environment.
  resources:
    requests:
      cpu: 400m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi
