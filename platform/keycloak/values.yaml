global:
  domain: danielgherasim.com
  authDomain: auth.danielgherasim.com
  environment: dev

keycloak:
  name: keycloak
  instances: 2
  image: quay.io/keycloak/keycloak:26.3.1
  hostname: ""
  httpRelativePath: /auth
  db:
    vendor: postgres
    host: postgresql.postgresql.svc.cluster.local
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-postgresql
      key: username
    passwordSecret:
      name: keycloak-postgresql
      key: password
  # Applied when global.environment == "dev" (single instance, right-sized
  # for a dissertation-scale cluster). See templates/keycloak.yaml.
  devResources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 750m
      memory: 768Mi
  # Applied for every other environment.
  resources:
    requests:
      cpu: 400m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi
