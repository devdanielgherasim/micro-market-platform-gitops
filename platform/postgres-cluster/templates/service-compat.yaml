apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/part-of: platform
spec:
  type: ClusterIP
  selector:
    cnpg.io/cluster: {{ .Values.cluster.name | quote }}
    role: primary
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
