apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "keycloak-config.realmConfigName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "keycloak-config.labels" . | nindent 4 }}
data:
  microservices-realm.json: |
    {
      "realm": {{ .Values.realm.name | quote }},
      "enabled": true,
      "sslRequired": "external",
      "registrationAllowed": false,
      "resetPasswordAllowed": true,
      "editUsernameAllowed": false,
      "bruteForceProtected": true,
      "permanentLockout": false,
      "failureFactor": {{ .Values.realm.bruteForce.failureFactor }},
      "waitIncrementSeconds": {{ .Values.realm.bruteForce.waitIncrementSeconds }},
      "maxFailureWaitSeconds": {{ .Values.realm.bruteForce.maxFailureWaitSeconds }},
      "accessTokenLifespan": {{ .Values.realm.accessTokenLifespan }},
      "ssoSessionIdleTimeout": {{ .Values.realm.ssoSessionIdleTimeout }},
      "ssoSessionMaxLifespan": {{ .Values.realm.ssoSessionMaxLifespan }},
      "otpPolicyType": "totp",
      "otpPolicyAlgorithm": "HmacSHA1",
      "otpPolicyDigits": 6,
      "otpPolicyPeriod": 30,
      "roles": {
        "realm": [
          { "name": "user", "description": "User role" },
          { "name": "admin", "description": "Administrator role" },
          { "name": "editor", "description": "Editor role for Grafana" },
          { "name": "kiali-admin", "description": "Kiali administrator role" }
        ]
      },
      "groups": [
        { "name": "admin", "path": "/admin", "realmRoles": ["admin", "kiali-admin"], "clientRoles": {}, "subGroups": [] },
        { "name": "editor", "path": "/editor", "realmRoles": ["editor"], "clientRoles": {}, "subGroups": [] },
        { "name": "user", "path": "/user", "realmRoles": ["user"], "clientRoles": {}, "subGroups": [] }
      ],
      "requiredActions": [
        { "alias": "CONFIGURE_TOTP", "name": "Configure OTP", "providerId": "CONFIGURE_TOTP", "enabled": true, "defaultAction": false, "priority": 10 }
      ],
      "clients": [
        {
          "clientId": {{ .Values.realm.frontendClientId | quote }},
          "enabled": true,
          "clientAuthenticatorType": "none",
          "redirectUris": {{ toJson .Values.realm.frontendRedirectUris }},
          "webOrigins": {{ toJson .Values.realm.frontendWebOrigins }},
          "rootUrl": {{ printf "https://%s" .Values.global.domain | quote }},
          "baseUrl": "/",
          "publicClient": true,
          "protocol": "openid-connect",
          "fullScopeAllowed": true,
          "directAccessGrantsEnabled": false,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": false,
          "defaultClientScopes": ["web-origins", "profile", "roles", "email", "account", "account-console"],
          "optionalClientScopes": ["address", "phone", "offline_access", "microprofile-jwt"]
        },
        {
          "clientId": "catalog-service",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "${CATALOG_SERVICE_SECRET}",
          "redirectUris": ["https://catalog.microservices.svc.cluster.local/*", "https://{{ .Values.global.domain }}/*"],
          "webOrigins": ["https://catalog.microservices.svc.cluster.local", "https://{{ .Values.global.domain }}"],
          "publicClient": false,
          "protocol": "openid-connect",
          "fullScopeAllowed": true,
          "serviceAccountsEnabled": true
        },
        {
          "clientId": "orders-service",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "${ORDERS_SERVICE_SECRET}",
          "redirectUris": ["https://orders.microservices.svc.cluster.local/*", "https://{{ .Values.global.domain }}/*"],
          "webOrigins": ["https://orders.microservices.svc.cluster.local", "https://{{ .Values.global.domain }}"],
          "publicClient": false,
          "protocol": "openid-connect",
          "fullScopeAllowed": true,
          "serviceAccountsEnabled": true
        },
        {
          "clientId": "audit-service",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "${AUDIT_SERVICE_SECRET}",
          "redirectUris": ["https://audit.microservices.svc.cluster.local/*", "https://{{ .Values.global.domain }}/*"],
          "webOrigins": ["https://audit.microservices.svc.cluster.local", "https://{{ .Values.global.domain }}"],
          "publicClient": false,
          "protocol": "openid-connect",
          "fullScopeAllowed": true,
          "serviceAccountsEnabled": true
        },
        {
          "clientId": "argocd",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "${ARGOCD_CLIENT_SECRET}",
          "redirectUris": ["https://{{ .Values.global.domain }}/argocd/auth/callback"],
          "webOrigins": ["https://{{ .Values.global.domain }}"],
          "rootUrl": "https://{{ .Values.global.domain }}",
          "baseUrl": "/argocd",
          "publicClient": false,
          "protocol": "openid-connect"
        },
        {
          "clientId": "grafana",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "${GRAFANA_OIDC_CLIENT_SECRET}",
          "redirectUris": ["https://{{ .Values.global.domain }}/grafana/login/generic_oauth"],
          "webOrigins": ["https://{{ .Values.global.domain }}"],
          "rootUrl": "https://{{ .Values.global.domain }}/grafana",
          "baseUrl": "/",
          "publicClient": false,
          "protocol": "openid-connect"
        },
        {
          "clientId": "kiali",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "${KIALI_CLIENT_SECRET}",
          "redirectUris": ["https://{{ .Values.global.domain }}/kiali/*"],
          "webOrigins": ["https://{{ .Values.global.domain }}"],
          "rootUrl": "https://{{ .Values.global.domain }}/kiali",
          "baseUrl": "/kiali",
          "publicClient": false,
          "protocol": "openid-connect"
        }
      ]{{- if .Values.realm.demoUsers.enabled }},
      "users": [
        {
          "username": "admin.demo",
          "enabled": true,
          "emailVerified": true,
          "firstName": "Admin",
          "lastName": "Demo",
          "groups": ["/admin"],
          "requiredActions": ["CONFIGURE_TOTP"]
        },
        {
          "username": "editor.demo",
          "enabled": true,
          "emailVerified": true,
          "firstName": "Editor",
          "lastName": "Demo",
          "groups": ["/editor"]
        },
        {
          "username": "user.demo",
          "enabled": true,
          "emailVerified": true,
          "firstName": "User",
          "lastName": "Demo",
          "groups": ["/user"]
        }
      ]{{- end }}
    }
