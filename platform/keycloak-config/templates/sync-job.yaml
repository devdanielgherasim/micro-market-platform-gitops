apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "keycloak-config.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "keycloak-config.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: {{ .Values.sync.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.sync.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "keycloak-config.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: keycloak-config-cli
          image: {{ .Values.sync.image | quote }}
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: KEYCLOAK_URL
              value: {{ .Values.keycloak.url | quote }}
            - name: KEYCLOAK_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.adminSecret.name | quote }}
                  key: username
            - name: KEYCLOAK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.adminSecret.name | quote }}
                  key: {{ .Values.keycloak.adminSecret.passwordKey | quote }}
            - name: KEYCLOAK_AVAILABILITYCHECK_ENABLED
              value: "true"
            - name: KEYCLOAK_AVAILABILITYCHECK_TIMEOUT
              value: 120s
            - name: IMPORT_FILES_LOCATIONS
              value: /config/microservices-realm.json
            - name: IMPORT_VARSUBSTITUTION_ENABLED
              value: "true"
            - name: CATALOG_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.clientSecrets.name | quote }}
                  key: catalog-service-secret
            - name: ORDERS_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.clientSecrets.name | quote }}
                  key: orders-service-secret
            - name: AUDIT_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.clientSecrets.name | quote }}
                  key: audit-service-secret
            - name: ARGOCD_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.clientSecrets.name | quote }}
                  key: argocd-client-secret
            - name: GRAFANA_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.clientSecrets.name | quote }}
                  key: grafana-client-secret
            - name: KIALI_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.clientSecrets.name | quote }}
                  key: kiali-client-secret
          volumeMounts:
            - name: realm-config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: realm-config
          configMap:
            name: {{ include "keycloak-config.realmConfigName" . }}
        - name: tmp
          emptyDir: {}
