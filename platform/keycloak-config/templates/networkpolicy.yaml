apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "keycloak-config.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "keycloak-config.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "keycloak-config.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  # No ingress: this is a one-shot sync Job, nothing needs to reach it.
  ingress: []
  egress:
    # DNS resolution.
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Keycloak admin REST API (KEYCLOAK_URL) is now an external PaaS
    # endpoint (ADR-19), not an in-cluster Service - PaaS control planes
    # don't publish stable CIDR ranges, so this is scoped to HTTPS only
    # rather than a specific destination (documented lab-scope tradeoff,
    # same class as ADR-17's).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
