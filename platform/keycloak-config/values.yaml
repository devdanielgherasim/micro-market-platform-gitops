global:
  domain: danielgherasim.com
  authDomain: auth.danielgherasim.com
  environment: dev

keycloak:
  # Public hostname (ADR-19: Keycloak moved off-cluster to managed PaaS per
  # cloud). Always the same value regardless of which cloud is active,
  # since auth.danielgherasim.com is handed between clouds by ExternalDNS
  # (ADR-10) - no per-cloud branching needed here, unlike keycloak_paas.tf.
  url: https://auth.danielgherasim.com/auth
  adminSecret:
    name: keycloak-admin
    passwordKey: password
  clientSecrets:
    name: keycloak-client-secrets

sync:
  image: adorsys/keycloak-config-cli:6.5.1-26.1.0
  backoffLimit: 3
  ttlSecondsAfterFinished: 600

realm:
  name: microservices
  frontendClientId: micro-market-frontend
  frontendRedirectUris:
    - https://danielgherasim.com/*
    - https://dev.danielgherasim.com/*
    - https://staging.danielgherasim.com/*
  frontendWebOrigins:
    - https://danielgherasim.com
    - https://dev.danielgherasim.com
    - https://staging.danielgherasim.com
  accessTokenLifespan: 900
  ssoSessionIdleTimeout: 1800
  ssoSessionMaxLifespan: 28800
  bruteForce:
    failureFactor: 5
    waitIncrementSeconds: 60
    maxFailureWaitSeconds: 900
  demoUsers:
    enabled: true
