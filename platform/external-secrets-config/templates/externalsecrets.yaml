{{- $root := . -}}
{{- $secretName := dict
  "aws" (dict
    "postgresql-auth" "postgresql/auth"
    "keycloak-postgresql" "keycloak/postgresql"
    "keycloak-admin" "keycloak/admin"
    "keycloak-client-secrets" "keycloak/clients"
    "grafana-admin" "grafana/admin"
    "grafana-oauth" "grafana/oauth"
    "cloudflare-api-token" "cloudflare/api-token"
    "catalog-db-secret" "catalog/db"
    "orders-db-secret" "orders/db"
    "audit-db-secret" "audit/db"
    "keycloak-secret" "microservices/keycloak"
  )
  "azure" (dict
    "postgresql-auth" "postgresql-auth"
    "keycloak-postgresql" "keycloak-postgresql"
    "keycloak-admin" "keycloak-admin"
    "keycloak-client-secrets" "keycloak-clients"
    "grafana-admin" "grafana-admin"
    "grafana-oauth" "grafana-oauth"
    "cloudflare-api-token" "cloudflare-api-token"
    "catalog-db-secret" "catalog-db"
    "orders-db-secret" "orders-db"
    "audit-db-secret" "audit-db"
    "keycloak-secret" "microservices-keycloak"
  )
  "gcp" (dict
    "postgresql-auth" "postgresql-auth"
    "keycloak-postgresql" "keycloak-postgresql"
    "keycloak-admin" "keycloak-admin"
    "keycloak-client-secrets" "keycloak-clients"
    "grafana-admin" "grafana-admin"
    "grafana-oauth" "grafana-oauth"
    "cloudflare-api-token" "cloudflare-api-token"
    "catalog-db-secret" "catalog-db"
    "orders-db-secret" "orders-db"
    "audit-db-secret" "audit-db"
    "keycloak-secret" "microservices-keycloak"
  )
-}}
{{- $namespaces := dict
  "postgresql-auth" "postgresql"
  "keycloak-postgresql" "keycloak"
  "keycloak-admin" "keycloak"
  "keycloak-client-secrets" "keycloak"
  "grafana-admin" "monitoring"
  "grafana-oauth" "monitoring"
  "cloudflare-api-token" "cert-manager"
  "catalog-db-secret" "microservices"
  "orders-db-secret" "microservices"
  "audit-db-secret" "microservices"
  "keycloak-secret" "microservices"
-}}
{{- $properties := dict
  "postgresql-auth" (list "username" "password" "postgres-password" "database")
  "keycloak-postgresql" (list "POSTGRES_USER" "POSTGRES_PASSWORD" "POSTGRES_DB" "POSTGRES_HOST" "POSTGRES_PORT")
  "keycloak-admin" (list "username" "password")
  "keycloak-client-secrets" (list "audit-service-secret" "catalog-service-secret" "orders-service-secret" "argocd-client-secret" "grafana-client-secret" "kiali-client-secret" "microservices-app")
  "grafana-admin" (list "admin-user" "admin-password")
  "grafana-oauth" (list "GRAFANA_OIDC_CLIENT_SECRET" "SMTP_PASSWORD" "DOMAIN")
  "cloudflare-api-token" (list "api-token")
  "catalog-db-secret" (list "username" "password")
  "orders-db-secret" (list "username" "password")
  "audit-db-secret" (list "username" "password")
  "keycloak-secret" (list "audit-service-secret" "catalog-service-secret" "orders-service-secret")
-}}
{{- range $target, $remoteByProvider := index $secretName $root.Values.global.cloudProvider }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $target | quote }}
  namespace: {{ index $namespaces $target | quote }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: platform-secrets
  target:
    name: {{ $target | quote }}
    creationPolicy: Owner
  data:
    {{- range $property := index $properties $target }}
    - secretKey: {{ $property | quote }}
      remoteRef:
        key: {{ include "external-secrets-config.remoteKey" (dict "root" $root "name" $remoteByProvider) | quote }}
        property: {{ $property | quote }}
    {{- end }}
{{- end }}
{{- $postgresRoleSecrets := dict
  "aws" (dict
    "catalog-db-secret" "catalog/db"
    "orders-db-secret" "orders/db"
    "audit-db-secret" "audit/db"
    "keycloak-postgresql" "keycloak/postgresql"
  )
  "azure" (dict
    "catalog-db-secret" "catalog-db"
    "orders-db-secret" "orders-db"
    "audit-db-secret" "audit-db"
    "keycloak-postgresql" "keycloak-postgresql"
  )
  "gcp" (dict
    "catalog-db-secret" "catalog-db"
    "orders-db-secret" "orders-db"
    "audit-db-secret" "audit-db"
    "keycloak-postgresql" "keycloak-postgresql"
  )
-}}
{{- range $target, $remoteByProvider := index $postgresRoleSecrets $root.Values.global.cloudProvider }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ printf "%s-postgresql-role" $target | quote }}
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: platform-secrets
  target:
    name: {{ $target | quote }}
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ include "external-secrets-config.remoteKey" (dict "root" $root "name" $remoteByProvider) | quote }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ include "external-secrets-config.remoteKey" (dict "root" $root "name" $remoteByProvider) | quote }}
        property: password
{{- end }}
{{- $keycloakClientRemote := index (index $secretName $root.Values.global.cloudProvider) "keycloak-client-secrets" -}}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kiali-client-secret
  namespace: kiali
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: platform-secrets
  target:
    name: keycloak-client-secrets
    creationPolicy: Owner
  data:
    - secretKey: kiali-client-secret
      remoteRef:
        key: {{ include "external-secrets-config.remoteKey" (dict "root" $root "name" $keycloakClientRemote) | quote }}
        property: kiali-client-secret
{{- if ne .Values.global.cloudProvider "aws" }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: platform-secrets
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: {{ include "external-secrets-config.remoteKey" (dict "root" . "name" "cloudflare-api-token") | quote }}
        property: api-token
{{- else }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: platform-secrets
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: {{ include "external-secrets-config.remoteKey" (dict "root" . "name" "cloudflare/api-token") | quote }}
        property: api-token
{{- end }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-admin-credentials
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: platform-secrets
  target:
    name: argocd-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ include "external-secrets-config.remoteKey" (dict "root" . "name" (ternary "argocd/admin" "argocd-admin" (eq .Values.global.cloudProvider "aws"))) | quote }}
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-redis-credentials
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: platform-secrets
  target:
    name: argocd-redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ include "external-secrets-config.remoteKey" (dict "root" . "name" (ternary "argocd/redis" "argocd-redis" (eq .Values.global.cloudProvider "aws"))) | quote }}
        property: password
