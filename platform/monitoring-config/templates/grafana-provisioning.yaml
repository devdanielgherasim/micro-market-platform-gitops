apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alert-rules
  labels:
    grafana_alert_rules: "1"
data:
  alert-rules.yaml: |
    apiVersion: 1
    groups: []
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-contact-points
  labels:
    grafana_contact_points: "1"
data:
  contact-points.yaml: |
    apiVersion: 1
    contactPoints: []
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: microservices-alerts
  labels:
    prometheus_alerts: "1"
data:
  microservices_alerts.yaml: |
    groups:
      - name: microservices
        rules:
          - alert: MicroserviceDown
            expr: up{namespace=~"micro-market-.*|microservices"} == 0
            for: 5m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: Microservice {{ "{{ $labels.service }}" }} is down
              description: Microservice {{ "{{ $labels.service }}" }} has been down for more than 5 minutes.
