global:
  repoURL: https://gitlab.com/microservices1691715/platform-gitops.git
  targetRevision: HEAD
  project: platform
  destinationServer: https://kubernetes.default.svc
  cloudProvider: azure
  environment: dev
  domain: danielgherasim.com
  authDomain: auth.danielgherasim.com
  acmeEmail: admin@danielgherasim.com
  clusterIssuer: letsencrypt-cloudflare-dns
  cloudflareApiTokenSecretName: cloudflare-api-token
  storageClass:
    aws: gp3
    azure: managed-csi
    gcp: standard-rwo

secretStores:
  aws:
    region: us-east-1
    secretPrefix: danielgherasim-microservices/dev
    externalSecretsRoleArn: ""
  azure:
    vaultUrl: ""
    tenantId: ""
    externalSecretsClientId: ""
  gcp:
    projectId: ""
    clusterLocation: europe-west3-a
    clusterName: ""
    secretPrefix: danielgherasim-microservices-dev
    externalSecretsServiceAccount: ""

project:
  namespace: argocd

addons:
  aws-load-balancer-controller:
    enabled: true
    enabledFor: [aws]
    namespace: kube-system
    repoURL: https://aws.github.io/eks-charts
    chart: aws-load-balancer-controller
    targetRevision: 1.8.2
    syncWave: "-20"
    valuesPath: platform/aws-load-balancer-controller/values.yaml
  storage-class:
    enabled: true
    enabledFor: [aws, azure, gcp]
    namespace: kube-system
    path: platform/storage-class
    syncWave: "-19"
  cert-manager:
    enabled: true
    namespace: cert-manager
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.17.2
    syncWave: "-18"
    valuesPath: platform/cert-manager/values.yaml
  cert-manager-config:
    enabled: true
    namespace: cert-manager
    path: platform/cert-manager-config
    syncWave: "-17"
  gateway-api-crds:
    enabled: true
    namespace: kube-system
    repoURL: https://github.com/kubernetes-sigs/gateway-api.git
    targetRevision: v1.3.0
    path: config/crd
    syncWave: "-16"
  istio-base:
    enabled: true
    namespace: istio-system
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: base
    targetRevision: 1.25.2
    syncWave: "-15"
    valuesPath: platform/istio-base/values.yaml
  istio-cni:
    enabled: true
    namespace: istio-system
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: cni
    targetRevision: 1.25.2
    syncWave: "-14"
    valuesPath: platform/istio-cni/values.yaml
  istiod:
    enabled: true
    namespace: istio-system
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    targetRevision: 1.25.2
    syncWave: "-13"
    valuesPath: platform/istiod/values.yaml
  ztunnel:
    enabled: true
    namespace: istio-system
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: ztunnel
    targetRevision: 1.25.2
    syncWave: "-12"
    valuesPath: platform/ztunnel/values.yaml
  gateway:
    enabled: true
    namespace: istio-ingress
    path: platform/gateway
    syncWave: "-10"
  kiali:
    enabled: true
    namespace: kiali
    repoURL: https://kiali.org/helm-charts
    chart: kiali-server
    targetRevision: 1.89.0
    syncWave: "-9"
    valuesPath: platform/kiali/values.yaml
  external-dns:
    enabled: true
    namespace: external-dns
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.15.2
    syncWave: "-8"
    valuesPath: platform/external-dns/values.yaml
  external-secrets:
    enabled: true
    namespace: external-secrets
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.5
    syncWave: "-7"
    valuesPath: platform/external-secrets/values.yaml
  external-secrets-config:
    enabled: true
    namespace: external-secrets
    path: platform/external-secrets-config
    syncWave: "-6"
  kube-prometheus-stack:
    enabled: true
    namespace: monitoring
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 75.3.0
    syncWave: "-5"
    valuesPath: platform/kube-prometheus-stack/values.yaml
  monitoring-config:
    enabled: true
    namespace: monitoring
    path: platform/monitoring-config
    syncWave: "-4"
  loki:
    enabled: true
    namespace: monitoring
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.30.1
    syncWave: "-3"
    valuesPath: platform/loki/values.yaml
  tempo:
    enabled: true
    namespace: monitoring
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo
    targetRevision: 1.21.1
    syncWave: "-3"
    valuesPath: platform/tempo/values.yaml
  alloy:
    enabled: true
    namespace: monitoring
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: 1.1.1
    syncWave: "-2"
    valuesPath: platform/alloy/values.yaml
  cloudnative-pg:
    enabled: true
    namespace: postgresql
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.23.2
    syncWave: "-1"
    valuesPath: platform/cloudnative-pg/values.yaml
  postgres-cluster:
    enabled: true
    namespace: postgresql
    path: platform/postgres-cluster
    syncWave: "0"
  keycloak-operator:
    # Local chart (platform/keycloak-operator), not an upstream chart source:
    # the Keycloak maintainers don't publish a Helm chart, and
    # quay.io/keycloak/keycloak-operator is a container image reference, not
    # a chart -- see that chart's Chart.yaml for the full explanation.
    enabled: true
    namespace: keycloak
    path: platform/keycloak-operator
    syncWave: "1"
  keycloak:
    enabled: true
    namespace: keycloak
    path: platform/keycloak
    syncWave: "2"
  keycloak-config:
    enabled: true
    namespace: keycloak
    path: platform/keycloak-config
    syncWave: "3"
