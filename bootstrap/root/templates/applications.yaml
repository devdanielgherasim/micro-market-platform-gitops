{{- $root := . -}}
{{- range $name, $addon := .Values.addons }}
{{- $cloudAllowed := true -}}
{{- if hasKey $addon "enabledFor" -}}
{{- $cloudAllowed = has $root.Values.global.cloudProvider $addon.enabledFor -}}
{{- end -}}
{{- if and $addon.enabled $cloudAllowed }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "platform-%s" $name | quote }}
  namespace: {{ $root.Values.project.namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $addon.syncWave | default "0" | quote }}
  labels:
    app.kubernetes.io/part-of: platform
    environment: {{ $root.Values.global.environment | quote }}
    cloud-provider: {{ $root.Values.global.cloudProvider | quote }}
spec:
  project: {{ $root.Values.global.project | quote }}
  {{- if hasKey $addon "path" }}
  source:
    repoURL: {{ default $root.Values.global.repoURL $addon.repoURL | quote }}
    targetRevision: {{ default $root.Values.global.targetRevision $addon.targetRevision | quote }}
    path: {{ $addon.path | quote }}
    {{- if not (hasKey $addon "repoURL") }}
    helm:
      valuesObject:
        global:
          cloudProvider: {{ $root.Values.global.cloudProvider | quote }}
          environment: {{ $root.Values.global.environment | quote }}
          domain: {{ $root.Values.global.domain | quote }}
          authDomain: {{ $root.Values.global.authDomain | quote }}
          acmeEmail: {{ $root.Values.global.acmeEmail | quote }}
          clusterIssuer: {{ $root.Values.global.clusterIssuer | quote }}
          cloudflareApiTokenSecretName: {{ $root.Values.global.cloudflareApiTokenSecretName | quote }}
          storageClass:
{{ toYaml $root.Values.global.storageClass | indent 12 }}
        {{- if eq $name "external-secrets-config" }}
        aws:
          region: {{ $root.Values.secretStores.aws.region | quote }}
          secretPrefix: {{ $root.Values.secretStores.aws.secretPrefix | quote }}
        azure:
          vaultUrl: {{ $root.Values.secretStores.azure.vaultUrl | quote }}
          tenantId: {{ $root.Values.secretStores.azure.tenantId | quote }}
          externalSecretsClientId: {{ $root.Values.secretStores.azure.externalSecretsClientId | quote }}
        gcp:
          projectId: {{ $root.Values.secretStores.gcp.projectId | quote }}
          clusterLocation: {{ $root.Values.secretStores.gcp.clusterLocation | quote }}
          clusterName: {{ $root.Values.secretStores.gcp.clusterName | quote }}
          secretPrefix: {{ $root.Values.secretStores.gcp.secretPrefix | quote }}
          serviceAccount:
            gcpServiceAccount: {{ $root.Values.secretStores.gcp.externalSecretsServiceAccount | quote }}
        {{- end }}
    {{- end }}
  {{- else }}
  sources:
    - repoURL: {{ $addon.repoURL | quote }}
      chart: {{ $addon.chart | quote }}
      targetRevision: {{ $addon.targetRevision | quote }}
      helm:
        valueFiles:
          - {{ printf "$values/%s" $addon.valuesPath | quote }}
        valuesObject:
          global:
            cloudProvider: {{ $root.Values.global.cloudProvider | quote }}
            environment: {{ $root.Values.global.environment | quote }}
            domain: {{ $root.Values.global.domain | quote }}
            authDomain: {{ $root.Values.global.authDomain | quote }}
            acmeEmail: {{ $root.Values.global.acmeEmail | quote }}
            clusterIssuer: {{ $root.Values.global.clusterIssuer | quote }}
            cloudflareApiTokenSecretName: {{ $root.Values.global.cloudflareApiTokenSecretName | quote }}
            storageClass: {{ index $root.Values.global.storageClass $root.Values.global.cloudProvider | quote }}
          {{ if eq $name "cert-manager" }}
          ingressShim:
            defaultIssuerName: {{ $root.Values.global.clusterIssuer | quote }}
            defaultIssuerKind: ClusterIssuer
          {{ end }}
          {{ if eq $name "external-dns" }}
          sources:
            - gateway-httproute
            - service
          domainFilters:
            - {{ $root.Values.global.domain | quote }}
          policy: sync
          txtOwnerId: micro-market
          env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Values.global.cloudflareApiTokenSecretName | quote }}
                  key: api-token
          {{ end }}
          {{ if eq $name "external-secrets" }}
          serviceAccount:
            annotations:
              {{- if and (eq $root.Values.global.cloudProvider "aws") $root.Values.secretStores.aws.externalSecretsRoleArn }}
              eks.amazonaws.com/role-arn: {{ $root.Values.secretStores.aws.externalSecretsRoleArn | quote }}
              {{- else if and (eq $root.Values.global.cloudProvider "azure") $root.Values.secretStores.azure.externalSecretsClientId }}
              azure.workload.identity/client-id: {{ $root.Values.secretStores.azure.externalSecretsClientId | quote }}
              {{- else if and (eq $root.Values.global.cloudProvider "gcp") $root.Values.secretStores.gcp.externalSecretsServiceAccount }}
              iam.gke.io/gcp-service-account: {{ $root.Values.secretStores.gcp.externalSecretsServiceAccount | quote }}
              {{- else }}
              {}
              {{- end }}
          {{ end }}
          {{ if eq $name "kiali" }}
          auth:
            openid:
              issuer_uri: {{ printf "https://%s/auth/realms/microservices" $root.Values.global.authDomain | quote }}
          {{ end }}
          {{ if eq $name "kube-prometheus-stack" }}
          prometheus:
            prometheusSpec:
              externalLabels:
                cluster: {{ $root.Values.global.environment | quote }}
                environment: {{ $root.Values.global.environment | quote }}
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: {{ index $root.Values.global.storageClass $root.Values.global.cloudProvider | quote }}
          alertmanager:
            alertmanagerSpec:
              externalUrl: {{ printf "https://%s/alertmanager" $root.Values.global.domain | quote }}
              storage:
                volumeClaimTemplate:
                  spec:
                    storageClassName: {{ index $root.Values.global.storageClass $root.Values.global.cloudProvider | quote }}
          grafana:
            persistence:
              storageClassName: {{ index $root.Values.global.storageClass $root.Values.global.cloudProvider | quote }}
            grafana.ini:
              server:
                domain: {{ $root.Values.global.domain | quote }}
                root_url: {{ printf "https://%s/grafana" $root.Values.global.domain | quote }}
              auth.generic_oauth:
                auth_url: {{ printf "https://%s/auth/realms/microservices/protocol/openid-connect/auth" $root.Values.global.authDomain | quote }}
                token_url: {{ printf "https://%s/auth/realms/microservices/protocol/openid-connect/token" $root.Values.global.authDomain | quote }}
                api_url: {{ printf "https://%s/auth/realms/microservices/protocol/openid-connect/userinfo" $root.Values.global.authDomain | quote }}
          {{ end }}
    - repoURL: {{ $root.Values.global.repoURL | quote }}
      targetRevision: {{ $root.Values.global.targetRevision | quote }}
      ref: values
  {{- end }}
  destination:
    server: {{ $root.Values.global.destinationServer | quote }}
    namespace: {{ $addon.namespace | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}
{{- end }}
